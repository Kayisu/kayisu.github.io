<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Kayisu | Portfolio Redirect</title>
    <script type="text/javascript">
      // GitHub Pages SPA hack
      // Redirect to index.html with the original path as a query parameter
      var l = window.location;
      var newUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/')[1] + '/?redirect=' + l.pathname + l.search + l.hash;
      // if on custom domain or root, adjusting path logic
      if(l.hostname.indexOf('github.io') === -1) {
          l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?redirect=' + l.pathname + l.search + l.hash);
      } else {
        // github pages subdir logic
        var pathSegs = l.pathname.split('/');
        var repoName = pathSegs[1];
        if (repoName === 'Kayisu.github.io' || repoName === '') {
            l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?redirect=' + l.pathname + l.search + l.hash);
        } else {
            l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' + repoName + '/?redirect=' + l.pathname + l.search + l.hash);
        }
      }
    </script>
  </head>
  <body>
  </body>
</html>
