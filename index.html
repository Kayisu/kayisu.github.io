<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Kayisu | Portfolio</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Portfolio of Emre Kaan Atas, a Software Developer crafting digital experiences with precision.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- GitHub Pages SPA Redirect Handler (rafgraph approach) -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <!-- Three.js Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <canvas id="stars"></canvas>

    <!-- Top-Right Toggle Button -->
    <button id="profile-toggle-btn" class="profile-toggle-btn" aria-label="Toggle Profile">
        <i id="toggle-icon" class="fas fa-eye"></i>
    </button>

    <!-- Top-Left Simulation Controls & Search -->
    <div class="sim-controls">
        <div class="speed-controls">
            <button class="speed-btn" data-speed="0" title="Pause"><i class="fas fa-pause"></i></button>
            <button class="speed-btn active" data-speed="1" title="Play (1x)"><i class="fas fa-play"></i></button>
            <button class="speed-btn" data-speed="5" title="Fast (5x)"><i class="fas fa-forward"></i></button>
            <button class="speed-btn" data-speed="20" title="Fastest (20x)"><i class="fas fa-fast-forward"></i></button>
        </div>
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="planet-search" placeholder="Search a planet..." autocomplete="off">
            <div id="search-results" class="search-results hidden"></div>
        </div>
    </div>
    
    <main id="main-content" class="content">
        <div class="profile-container">
            <h1 class="name">Hi, these are all about me:</h1>
            
            <div class="links">
                <a href="https://github.com/Kayisu/" target="_blank" rel="noopener noreferrer" class="social-link" id="link-github">
                    <i class="fab fa-github"></i> GitHub
                </a>
                <a href="mailto:emre-atas-01@hotmail.com" class="social-link" id="link-email">
                    <i class="fas fa-envelope"></i> Email
                </a>
                <a href="https://www.linkedin.com/in/emrekaanatas/" target="_blank" rel="noopener noreferrer" class="social-link" id="link-linkedin">
                    <i class="fab fa-linkedin"></i> LinkedIn
                </a>
            </div>
        </div>
    </main>

    <!-- Placeholder UI for Planet Routing -->
    <div id="planet-info-panel" class="planet-info-panel hidden">
        <button id="close-btn" class="close-btn"><i class="fas fa-times"></i></button>
        <h2 id="planet-name" class="planet-name">Planet Name</h2>
        <p class="planet-desc">Incoming data transmission...</p>
        <div class="planet-stats">
            <div class="stat"><span class="label">Type:</span> <span id="planet-type">Unknown</span></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
